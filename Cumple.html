<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Margina 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #ff6f91);
    color: white;
    text-align: center;
    overflow: hidden;
}

#pantallaInicio {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#pantallaInicio button {
    padding: 15px 30px;
    font-size: 18px;
    border-radius: 30px;
    border: none;
    background: #ff6f91;
    color: white;
    cursor: pointer;
}

.contenido {
    display: none;
    padding: 20px;
}

h1 {
    margin-top: 40px;
}

#contador {
    margin: 20px;
    font-size: 1.2em;
}

#mensaje {
    max-width: 600px;
    margin: auto;
    font-size: 1.2em;
    white-space: pre-line;
}

.cursor {
    display: inline-block;
    background: white;
    width: 2px;
    height: 20px;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}

.heart {
    position: fixed;
    color: red;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<div id="pantallaInicio">
    <h2>💌 Tienes un mensaje...</h2>
    <button onclick="iniciar()">Abrir</button>
</div>

<div class="contenido" id="contenido">

    <audio id="musica" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b46b2.mp3?filename=romantic-love-ambient-110110.mp3">
    </audio>

    <h1>🎉 Feliz Cumpleaños, Margina Ivette 💖</h1>

    <div id="contador"></div>

    <p id="mensaje"></p><span class="cursor"></span>

</div>

<script>
function iniciar() {
    document.getElementById("pantallaInicio").style.display = "none";
    document.getElementById("contenido").style.display = "block";
    document.getElementById("musica").play();
    escribirTexto();
}

// CONTADOR (ajusta la fecha cuando empezaron)
const fechaInicio = new Date("2022-12-19");

function actualizarContador() {
    const ahora = new Date();
    const diff = ahora - fechaInicio;

    const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
    const horas = Math.floor(diff / (1000 * 60 * 60)) % 24;
    const minutos = Math.floor(diff / (1000 * 60)) % 60;

    document.getElementById("contador").innerHTML =
        `⏳ Llevamos ${dias} días, ${horas} horas y ${minutos} minutos juntos ❤️`;
}

setInterval(actualizarContador, 1000);
actualizarContador();

// TEXTO
const texto = `Hoy no es un día cualquiera...

Hoy celebra la vida de la persona que cambió la mía por completo.

Margina Ivette, gracias por estos 3 años, 3 meses y 14 días a tu lado...
por cada risa, cada momento y cada recuerdo que hemos construido juntos.

Gracias a Dios por que te regala un año mas a la par mia, amandonos mas que nunca.

Este es el tercer cumpleaños que paso contigo...
y si depende de mí, serán todos los que vengan.

Te amo con todo mi corazón ❤️`;

let i = 0;

function escribirTexto() {
    if (i < texto.length) {
        document.getElementById("mensaje").innerHTML += texto.charAt(i);
        i++;
        setTimeout(escribirTexto, 35);
    }
}

// corazones
setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 10 + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}, 300);
</script>

</body>
  </html>
